name: Daily verified data update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update verified game data
        run: npm run update:data

      - name: Update patch notes
        run: npm run update:patches
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Build verification
        if: steps.changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Generate change summary
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "## Change Summary" > CHANGELOG_DAILY.md
          echo "" >> CHANGELOG_DAILY.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> CHANGELOG_DAILY.md
          echo "" >> CHANGELOG_DAILY.md
          echo "### Changed files" >> CHANGELOG_DAILY.md
          git diff --name-only >> CHANGELOG_DAILY.md
          echo "" >> CHANGELOG_DAILY.md
          echo "### Data changes" >> CHANGELOG_DAILY.md
          git diff --stat data/ >> CHANGELOG_DAILY.md
          echo "" >> CHANGELOG_DAILY.md
          echo "Build: passed" >> CHANGELOG_DAILY.md

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data scripts package.json package-lock.json CHANGELOG_DAILY.md
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: daily data update ${DATE}

          Automated source check and verified data update.
          Build verification: passed."
          git push

      - name: Summary
        if: always()
        run: |
          echo "Daily data update completed."
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Result: Changes detected, committed, and pushed."
          else
            echo "Result: No source changes detected."
          fi
